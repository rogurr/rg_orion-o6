# Workflow to build the ODP version of the bootchain for a Radxa Orion O6 platform
#
# SPDX-License-Identifier: MIT
#

name: bootchain-build

permissions:
  contents: read

env:
  # The container image is built in a separate workflow and published to GHCR.
  DEVCONTAINER_IMAGE: "ghcr.io/opendevicepartnership/odp-platform-radxa-orion-o6/devcontainer:latest"

# Trigger on pull requests and manual triggering
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Orion O6 bootchain
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Pull Container
        run: podman pull "${{ env.DEVCONTAINER_IMAGE }}"

      - name: Update Workspace Ownership
        # The runner checks out files as a different UID than the container user (UID 1000).
        run: |
          podman run --rm \
            --user root \
            -v "${{ github.workspace }}:/workspace" \
            "${{ env.DEVCONTAINER_IMAGE }}" \
            chown -R 1000:1000 /workspace

      - name: Build Firmware
        run: |
          podman run --rm \
            -w /workspace \
            -v "${{ github.workspace }}:/workspace" \
            "${{ env.DEVCONTAINER_IMAGE }}" \
            make all
