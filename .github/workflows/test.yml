# This workflow runs unit tests for Rust components in the repository
#
# SPDX-License-Identifier: MIT
#

name: test

# Restrict GitHub permissions to only what is necessary for the workflow
permissions:
  contents: read

# TEMPORARY: push to main is also enabled so the test workflow runs on every commit to main
# in the fork, matching pull_request behavior. Remove before merging to upstream.
#
# Trigger the workflow on pull requests to the main branch and allow manual triggering
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  # Run Rust unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-19
          targets: x86_64-unknown-linux-gnu
          components: rust-src, clippy, rustfmt

      - name: Run Tests
        run: make test
