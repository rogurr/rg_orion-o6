# Builds the ODP Validation OS WIM image on a Windows runner.
#
# SPDX-License-Identifier: MIT
#
# Triggers:
#   - pull_request:    CI validation (artifact uploaded, 1-day retention).
#   - workflow_dispatch: manual build from any branch (artifact uploaded, 1-day retention).
#   - workflow_call:   invoked by the release workflow with a specific git ref.
#

name: build_os_image

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'postbuild/os/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git tag in vYYYY.MM.DD format'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    name: Build Orion O6 OS image
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || '' }}

      - name: Download Validation OS ISO
        run: Invoke-WebRequest -Uri "https://aka.ms/DownloadValidationOS_arm64" -OutFile ValidationOS.iso

      - name: Build WIM
        run: |
          $mount = Mount-DiskImage -ImagePath (Resolve-Path ValidationOS.iso).Path -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          try {
            cmd /c "${drive}:\GenImage\GenImage.cmd -PackagesList:postbuild\os\O6_config.pkg -PackagePath:${drive}:\cabs -ImagePath:${drive}:\ -RegistryImport:postbuild\os\O6_policy.reg -OutPath:build\postbuild\os -wim -NoWait"
            if ($LASTEXITCODE -ne 0) { throw "GenImage.cmd failed with exit code $LASTEXITCODE" }
          } finally {
            Dismount-DiskImage -ImagePath $mount.ImagePath
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: os-image
          path: build/postbuild/os/ValidationOS-1.wim
          retention-days: 1
          if-no-files-found: error
