# Builds the ODP Validation OS WIM image on a Windows runner.
#
# SPDX-License-Identifier: MIT
#

name: os-build

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches: [main]
    paths:
      - 'postbuild/os/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    name: Build Orion O6 OS image
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Download Validation OS ISO
        run: Invoke-WebRequest -Uri "https://aka.ms/DownloadValidationOS_arm64" -OutFile ValidationOS.iso

      - name: Build WIM
        run: |
          $mount = Mount-DiskImage -ImagePath (Resolve-Path ValidationOS.iso).Path -PassThru
          $drive = ($mount | Get-Volume).DriveLetter
          try {
            cmd /c "${drive}:\GenImage\GenImage.cmd -PackagesList:postbuild\os\O6_config.pkg -PackagePath:${drive}:\cabs -ImagePath:${drive}:\ -RegistryImport:postbuild\os\O6_policy.reg -OutPath:build\postbuild\os -wim -NoWait"
            if ($LASTEXITCODE -ne 0) { throw "GenImage.cmd failed with exit code $LASTEXITCODE" }
          } finally {
            Dismount-DiskImage -ImagePath $mount.ImagePath
          }

      - name: Stage WIM
        run: |
          $date = (Get-Date).ToUniversalTime().ToString("yyyyMMdd")
          Rename-Item -Path build\postbuild\os\ValidationOS-1.wim -NewName "ODP-O6-ValidationOS-$date.wim"

      # Upload ephemeral artifact for any dispatch except manually on main
      - name: Upload ephemeral artifact
        if: >
          !(github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: os-image-${{ github.run_id }}
          path: build/postbuild/os/**
          retention-days: 7
          if-no-files-found: error

      # Publish NuGet package when dispatched manually on main
      - name: Upload nuget artifact
        if: >
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # TODO: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
          python3 common/tools/upload_nuget_artifact.py \
            --package-id  "Rogurr.OrionO6.OsImage" \
            --description "Radxa Orion O6 Validation OS WIM image" \
            --input_dir  "${GITHUB_WORKSPACE}/build/postbuild/os" \
            --output_dir "${GITHUB_WORKSPACE}/build/nuget"
