# Builds all platform deliverables and publishes them as a GitHub Release with NuGet packages.
#
# SPDX-License-Identifier: MIT
#
# Triggered by pushing a tag matching v*. The tag name is used as the release name.
# The publish job is gated by the "release" GitHub Environment — only repo managers can approve execution.
#

name: publish_release_image

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# TODO: Revert to 'rogurr' namespace tags to 'opendevicepartnership' before merging to upstream.

env:
  # Pinned devcontainer image used by the build_*_bootchain workflows; keep in sync with their `image:` line.
  CONTAINER_IMAGE: "ghcr.io/rogurr/odp-platform-radxa-orion-o6_devcontainer:v2026.05.14"

jobs:
  # ---------- Parallel builds at the tagged ref ----------
  build-debug:
    uses: ./.github/workflows/build_debug_bootchain.yml
    with:
      git_ref: ${{ github.ref_name }}

  build-release:
    uses: ./.github/workflows/build_release_bootchain.yml
    with:
      git_ref: ${{ github.ref_name }}

  build-os:
    uses: ./.github/workflows/build_os_image.yml
    with:
      git_ref: ${{ github.ref_name }}

  # ---------- Collect artifacts, pack NuGet, create GitHub Release ----------
  publish:
    runs-on: ubuntu-latest
    environment: release
    needs: [build-debug, build-release, build-os]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Pack and push NuGet packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ---------- Derive the NuGet version from the git tag ----------
          # NuGet requires SemVer-compatible versions, so:
          #   - strip the leading `v` from the tag (e.g. v2026.05.14 -> 2026.05.14)
          #   - strip leading zeros from each numeric segment   (2026.05.14 -> 2026.5.14)
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          VERSION="$(echo "$VERSION" | sed -E 's/(^|\.)0+([0-9])/\1\2/g')"
          echo "Packaging NuGet artifacts as version: $VERSION"

          # Shared csproj used for every package; only the metadata properties differ per call.
          CSPROJ="common/tools/nuget_release_project.csproj"
          NUGET_SOURCE="https://nuget.pkg.github.com/rogurr/index.json"
          mkdir -p nuget-out

          # ---------- ODP.OrionO6.DebugBootchain ----------
          dotnet pack "$CSPROJ" \
            -p:PackageId=ODP.OrionO6.DebugBootchain \
            -p:Version="$VERSION" \
            -p:Description="ODP Version of the Radxa Orion O6 debug bootchain" \
            -p:PayloadPath="artifacts/bootchain-debug" \
            -o nuget-out
          dotnet nuget push "nuget-out/ODP.OrionO6.DebugBootchain.$VERSION.nupkg" \
            --source "$NUGET_SOURCE" \
            --api-key "$GH_TOKEN" \
            --skip-duplicate

          # ---------- ODP.OrionO6.ReleaseBootchain ----------
          dotnet pack "$CSPROJ" \
            -p:PackageId=ODP.OrionO6.ReleaseBootchain \
            -p:Version="$VERSION" \
            -p:Description="ODP Version of the Radxa Orion O6 release bootchain" \
            -p:PayloadPath="artifacts/bootchain-release" \
            -o nuget-out
          dotnet nuget push "nuget-out/ODP.OrionO6.ReleaseBootchain.$VERSION.nupkg" \
            --source "$NUGET_SOURCE" \
            --api-key "$GH_TOKEN" \
            --skip-duplicate

          # ---------- ODP.OrionO6.OsImage ----------
          dotnet pack "$CSPROJ" \
            -p:PackageId=ODP.OrionO6.OsImage \
            -p:Version="$VERSION" \
            -p:Description="ODP Version of the Radxa Orion O6 Validation OS WIM image" \
            -p:PayloadPath="artifacts/os-image" \
            -o nuget-out
          dotnet nuget push "nuget-out/ODP.OrionO6.OsImage.$VERSION.nupkg" \
            --source "$NUGET_SOURCE" \
            --api-key "$GH_TOKEN" \
            --skip-duplicate

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 common/tools/prepare_release.py \
            --git-ref       "${{ github.ref_name }}" \
            --container     "${CONTAINER_IMAGE}" \
            --nuget-dir     "nuget-out" \
            --output        "release-notes.md"
          echo "notes_file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find artifacts -type f)
          mapfile -t nupkgs < <(find nuget-out -name '*.nupkg' -type f)
          printf 'Attaching: %s\n' "${assets[@]}" "${nupkgs[@]}"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            "${assets[@]}" "${nupkgs[@]}"
