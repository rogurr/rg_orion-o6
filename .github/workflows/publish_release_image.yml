# Builds all platform deliverables and publishes them as a GitHub Release with NuGet packages.
#
# SPDX-License-Identifier: MIT
#
# Triggered by pushing a Git tag starting with 'v', will be validated against the format vYYYY.MM.DD, and will be used
# as the release name.  The publish job is gated by the "release" GitHub Environment which is restricted to repo managers.
#

name: publish_release_image

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# TODO: Revert to 'rogurr' namespace tags to 'opendevicepartnership' before merging to upstream.

jobs:
  # ---------- Parallel builds at the tagged ref ----------
  build-debug:
    uses: ./.github/workflows/build_debug_bootchain.yml
    with:
      git_ref: ${{ github.ref_name }}

  build-release:
    uses: ./.github/workflows/build_release_bootchain.yml
    with:
      git_ref: ${{ github.ref_name }}

  build-os:
    uses: ./.github/workflows/build_os_image.yml
    with:
      git_ref: ${{ github.ref_name }}

  # ---------- Collect artifacts, pack NuGet, create GitHub Release ----------
  publish:
    runs-on: ubuntu-latest
    environment: release
    needs: [build-debug, build-release, build-os]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Resolve VERSION from git tag
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if [[ ! "$tag" =~ ^v([0-9]{4})\.([0-9]{2})\.([0-9]{2})$ ]]; then
            echo "::error::Tag '$tag' does not match required format vYYYY.MM.DD"
            exit 1
          fi
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release notes
        run: |
          set -euo pipefail
          python3 common/tools/prepare_release_notes.py --git-tag "${{ github.ref_name }}" --notes-file "ReleaseNotes.md"

      - name: Pack and push ODP.OrionO6.DebugBootchain NuGet package
        run: |
          set -euo pipefail
          dotnet pack "common/tools/nuget_release_project.csproj" \
            -p:PackageId=ODP.OrionO6.DebugBootchain \
            -p:Version="$VERSION" \
            -p:Description="ODP Version of the Radxa Orion O6 debug bootchain" \
            -p:PayloadPath="artifacts/bootchain-debug" \
            -o nuget-out
          dotnet nuget push "nuget-out/ODP.OrionO6.DebugBootchain.$VERSION.nupkg" \
            --source "https://nuget.pkg.github.com/rogurr/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Pack and push ODP.OrionO6.ReleaseBootchain NuGet package
        run: |
          set -euo pipefail
          dotnet pack "common/tools/nuget_release_project.csproj" \
            -p:PackageId=ODP.OrionO6.ReleaseBootchain \
            -p:Version="$VERSION" \
            -p:Description="ODP Version of the Radxa Orion O6 release bootchain" \
            -p:PayloadPath="artifacts/bootchain-release" \
            -o nuget-out
          dotnet nuget push "nuget-out/ODP.OrionO6.ReleaseBootchain.$VERSION.nupkg" \
            --source "https://nuget.pkg.github.com/rogurr/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Pack and push ODP.OrionO6.OsImage NuGet package
        run: |
          set -euo pipefail
          dotnet pack "common/tools/nuget_release_project.csproj" \
            -p:PackageId=ODP.OrionO6.OsImage \
            -p:Version="$VERSION" \
            -p:Description="ODP Version of the Radxa Orion O6 Validation OS WIM image" \
            -p:PayloadPath="artifacts/os-image" \
            -o nuget-out
          dotnet nuget push "nuget-out/ODP.OrionO6.OsImage.$VERSION.nupkg" \
            --source "https://nuget.pkg.github.com/rogurr/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find artifacts -type f)
          mapfile -t nupkgs < <(find nuget-out -name '*.nupkg' -type f)
          printf 'Attaching: %s\n' "${assets[@]}" "${nupkgs[@]}"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "ReleaseNotes.md" \
            "${assets[@]}" "${nupkgs[@]}"
