# Builds the ODP debug bootchain for the Radxa Orion O6 platform inside this repository's devcontainer image.
#
# SPDX-License-Identifier: MIT
#

name: bootchain-debug-build

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.devcontainer/**'
      - 'postbuild/os/**'
      - '.github/workflows/container_build.yml'
      - '.github/workflows/os_build.yml'
      - '.github/workflows/release_publish.yml'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Orion O6 debug bootchain
    container:
      # TODO: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
      image: ghcr.io/rogurr/odp-platform-radxa-orion-o6/devcontainer:latest
      options: --user root
    defaults:
      run:
        shell: bash
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Debug Firmware
        run: make all TARGET=debug

      # Upload ephemeral artifact for any dispatch except manually on main
      - name: Upload ephemeral artifact
        if: >
          !(github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: bootchain-debug-${{ github.run_id }}
          path: build/postbuild/bootchain/**
          retention-days: 7
          if-no-files-found: error

      # Publish NuGet package when dispatched manually on main
      - name: Upload nuget artifact
        if: >
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 common/tools/upload_nuget_artifact.py \
            --package-id  "ODP.OrionO6.BootchainDebug" \
            --description "Radxa Orion O6 debug bootchain" \
            --input_dir  "${GITHUB_WORKSPACE}/build/postbuild/bootchain" \
            --output_dir "${GITHUB_WORKSPACE}/build/nuget"
