# Builds the ODP release bootchain for the Radxa Orion O6 platform inside this repository's devcontainer image.
#
# SPDX-License-Identifier: MIT
#
# Triggers:
#   - pull_request:    CI validation (artifact uploaded, 1-day retention).
#   - workflow_dispatch: manual build from any branch (artifact uploaded, 1-day retention).
#   - workflow_call:   invoked by the release workflow with a specific git ref.
#

name: bootchain-release-build

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.devcontainer/**'
      - 'postbuild/os/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      container_tag:
        description: 'Devcontainer image tag, format: yyyy.mm.dd'
        required: false
        default: 'latest'
        type: string
  workflow_call:
    inputs:
      git_ref:
        description: 'Git tag in Release_YYYY.MM.DD format'
        required: true
        type: string
      container_tag:
        description: 'Devcontainer image tag, format: yyyy.mm.dd'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Orion O6 release bootchain
    container:
      # TODO: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
      image: ghcr.io/rogurr/odp-platform-radxa-orion-o6/devcontainer:${{ inputs.container_tag || 'latest' }}
      options: --user root
    defaults:
      run:
        shell: bash
    steps:
      - name: Validate container tag
        if: inputs.git_ref && inputs.container_tag == 'latest'
        run: |
          echo "::error::workflow_call requires a specific container_tag, not 'latest'"
          exit 1

      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || '' }}
          submodules: recursive

      - name: Build Release Firmware
        run: make all TARGET=release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bootchain-release
          path: build/postbuild/bootchain/**
          retention-days: 1
          if-no-files-found: error
