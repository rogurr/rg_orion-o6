# Builds the ODP debug bootchain for the Radxa Orion O6 platform inside the published devcontainer image.
#
# Every step in this job runs INSIDE the devcontainer image via `jobs.<id>.container:`. The image is the
# single source of truth for build, package, and publish tooling; CI uses exactly the same environment a
# local user would.
#
# Behavior:
#   - pull_request:               build only, output discarded.
#   - workflow_dispatch on the upstream repo's `main` branch:
#                                 build, then publish a NuGet package to GitHub Packages.
#   - workflow_dispatch elsewhere (any branch, or any fork):
#                                 build, then upload the binary as a workflow artifact (7-day retention).
#
# TEMPORARY: push to main is also enabled as a trigger (no path filters) and the publish path is
# unblocked for push events, so the full build+publish flow can be tested in the fork without
# requiring a workflow_dispatch. Remove the push trigger and revert the event_name conditions
# before merging to upstream.
#
# SPDX-License-Identifier: MIT
#

name: bootchain-debug-build

permissions:
  contents: read
  packages: write   # required only for the NuGet publish path; ignored otherwise.

env:
  # FORK TESTING: all coordinates point at rogurr's personal namespace.
  # Revert to OpenDevicePartnership equivalents before merging to upstream.
  PACKAGE_ID:    "Rogurr.OrionO6.SpiNorDebug"
  UPSTREAM_REPO: "rogurr/rg_orion-o6"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '.devcontainer/**'
      - 'postbuild/os/**'
      - '.github/workflows/container_build.yml'
      - '.github/workflows/os_build.yml'
      - '.github/workflows/release_publish.yml'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Orion O6 debug bootchain
    container:
      # FORK TESTING: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
      image: ghcr.io/rogurr/odp-platform-radxa-orion-o6/devcontainer:latest
      # Run as root inside the container. The runner mounts /__w (workspace) and /__w/_temp
      # (file-command channel) as root-owned; if we run as the image's default `vscode` user
      # (UID 1000), actions/checkout fails with EACCES on /__w/_temp/_runner_file_commands/...
      # Outputs end up root-owned inside the ephemeral runner workspace, which is harmless.
      options: --user root
    # Force bash as the default shell for `run:` steps. Without this, GitHub Actions falls
    # back to `sh -e` inside the container, which is dash and rejects `set -o pipefail`.
    defaults:
      run:
        shell: bash
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Debug Firmware
        run: make all

      # The remaining steps only run when not triggered by a pull_request.
      - name: Stage binary output
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p staging
          cp -r build/postbuild/bootchain/. staging/
          ls -la staging

      # ----- Path A: ephemeral artifact for forks / non-main branches -----
      - name: Upload ephemeral artifact
        if: >
          github.event_name != 'pull_request' &&
          !(github.repository == env.UPSTREAM_REPO && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: bootchain-debug-${{ github.run_id }}
          path: staging/**
          retention-days: 7
          if-no-files-found: error

      # ----- Path B: NuGet publish from upstream main -----
      - name: Compute NuGet version
        if: >
          github.event_name != 'pull_request' &&
          github.repository == env.UPSTREAM_REPO &&
          github.ref == 'refs/heads/main'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # NuGet rejects leading zeros in numeric segments, so use Y.M.D (no zero-pad on M/D).
          base="$(date -u +%Y.%-m.%-d)"
          # Fetch existing versions for this package; 404 (first publish ever) is fine.
          # NOTE: user-owned packages use /users/<user>/... not /orgs/<org>/...
          existing=$(gh api -H "Accept: application/vnd.github+json" \
                       "/users/rogurr/packages/nuget/${PACKAGE_ID}/versions" \
                       --jq '.[].name' 2>/dev/null || true)
          count=$(printf '%s\n' "$existing" | grep -cE "^${base}(\.[0-9]+)?$" || true)
          if [ "$count" -eq 0 ]; then
            version="${base}"
          else
            version="${base}.${count}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Computed NuGet version: ${version}"

      - name: Generate .csproj for packaging
        if: steps.version.outputs.version
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p nupkg-src
          cat > nupkg-src/${PACKAGE_ID}.csproj <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <PackageId>${PACKAGE_ID}</PackageId>
              <Version>${PKG_VERSION}</Version>
              <Authors>rogurr</Authors>
              <Description>Radxa Orion O6 debug bootchain SPI-NOR binaries.</Description>
              <RepositoryUrl>https://github.com/${UPSTREAM_REPO}</RepositoryUrl>
              <PackageLicenseExpression>MIT</PackageLicenseExpression>
              <IncludeBuildOutput>false</IncludeBuildOutput>
              <NoBuild>true</NoBuild>
              <NoWarn>NU5128;NU5100;NU5110;NU5111</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              <None Include="..\\staging\\**\\*" Pack="true" PackagePath="content\\" />
            </ItemGroup>
          </Project>
          EOF

      - name: Pack NuGet package
        if: steps.version.outputs.version
        run: dotnet pack nupkg-src/${PACKAGE_ID}.csproj -o nupkg-out

      - name: Push NuGet package to GitHub Packages
        if: steps.version.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push "nupkg-out/*.nupkg" \
            --source "https://nuget.pkg.github.com/rogurr/index.json" \
            --api-key "${GH_TOKEN}" \
            --skip-duplicate
