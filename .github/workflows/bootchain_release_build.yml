# Builds the ODP release bootchain for the Radxa Orion O6 platform inside the published devcontainer image.
#
# Every step in this job runs INSIDE the devcontainer image via `jobs.<id>.container:`. The image is the
# single source of truth for build, package, and publish tooling; CI uses exactly the same environment a
# local user would.
#
# Behavior mirrors bootchain_debug_build.yml; see that file for the full description.
#
# NOTE: A distinct release build target is not yet wired into the root Makefile. For this iteration this
# workflow runs the same `make all` target as the debug build. When a release flag is added, update the
# Build step.
#
# TEMPORARY: push to main is also enabled as a trigger (no path filters) and the publish path is
# unblocked for push events, so the full build+publish flow can be tested in the fork without
# requiring a workflow_dispatch. Remove the push trigger and revert the event_name conditions
# before merging to upstream.
#
# SPDX-License-Identifier: MIT
#

name: bootchain-release-build

permissions:
  contents: read
  packages: write

env:
  # FORK TESTING: all coordinates point at rogurr's personal namespace.
  # Revert to OpenDevicePartnership equivalents before merging to upstream.
  PACKAGE_ID:    "Rogurr.OrionO6.SpiNorRelease"
  UPSTREAM_REPO: "rogurr/rg_orion-o6"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '.devcontainer/**'
      - 'postbuild/os/**'
      - '.github/workflows/container_build.yml'
      - '.github/workflows/os_build.yml'
      - '.github/workflows/release_publish.yml'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Orion O6 release bootchain
    container:
      # FORK TESTING: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
      image: ghcr.io/rogurr/odp-platform-radxa-orion-o6/devcontainer:latest
      # Run as root; see bootchain_debug_build.yml for the rationale (actions/checkout needs
      # write access to /__w/_temp, which is mounted root-owned by the runner).
      options: --user root
    # Force bash; see bootchain_debug_build.yml for the rationale.
    defaults:
      run:
        shell: bash
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Release Firmware
        # TODO: switch to a real release target when the Makefile supports it.
        run: make all

      - name: Stage binary output
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p staging
          cp -r build/postbuild/bootchain/. staging/
          ls -la staging

      - name: Upload ephemeral artifact
        if: >
          github.event_name != 'pull_request' &&
          !(github.repository == env.UPSTREAM_REPO && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: bootchain-release-${{ github.run_id }}
          path: staging/**
          retention-days: 7
          if-no-files-found: error

      - name: Compute NuGet version
        if: >
          github.event_name != 'pull_request' &&
          github.repository == env.UPSTREAM_REPO &&
          github.ref == 'refs/heads/main'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          base="$(date -u +%Y.%-m.%-d)"
          # NOTE: user-owned packages use /users/<user>/... not /orgs/<org>/...
          existing=$(gh api -H "Accept: application/vnd.github+json" \
                       "/users/rogurr/packages/nuget/${PACKAGE_ID}/versions" \
                       --jq '.[].name' 2>/dev/null || true)
          count=$(printf '%s\n' "$existing" | grep -cE "^${base}(\.[0-9]+)?$" || true)
          if [ "$count" -eq 0 ]; then
            version="${base}"
          else
            version="${base}.${count}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Computed NuGet version: ${version}"

      - name: Generate .csproj for packaging
        if: steps.version.outputs.version
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p nupkg-src
          cat > nupkg-src/${PACKAGE_ID}.csproj <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <PackageId>${PACKAGE_ID}</PackageId>
              <Version>${PKG_VERSION}</Version>
              <Authors>rogurr</Authors>
              <Description>Radxa Orion O6 release bootchain SPI-NOR binaries.</Description>
              <RepositoryUrl>https://github.com/${UPSTREAM_REPO}</RepositoryUrl>
              <PackageLicenseExpression>MIT</PackageLicenseExpression>
              <IncludeBuildOutput>false</IncludeBuildOutput>
              <NoBuild>true</NoBuild>
              <NoWarn>NU5128;NU5100;NU5110;NU5111</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              <None Include="..\\staging\\**\\*" Pack="true" PackagePath="content\\" />
            </ItemGroup>
          </Project>
          EOF

      - name: Pack NuGet package
        if: steps.version.outputs.version
        run: dotnet pack nupkg-src/${PACKAGE_ID}.csproj -o nupkg-out

      - name: Push NuGet package to GitHub Packages
        if: steps.version.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push "nupkg-out/*.nupkg" \
            --source "https://nuget.pkg.github.com/rogurr/index.json" \
            --api-key "${GH_TOKEN}" \
            --skip-duplicate
