# Builds the DevContainer image for this repository and publishes it to the GitHub Container Registry (GHCR).
#
# SPDX-License-Identifier: MIT
#
# Triggered by pushing a tag matching v*. The tag name is used as the version tag on the container image.
# Access is gated by the "release" GitHub Environment — only repo managers can approve execution.
#

name: publish_container

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  # TODO: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
  CONTAINER_IMAGE: "ghcr.io/rogurr/odp-platform-radxa-orion-o6_devcontainer"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    name: Build and publish devcontainer image
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login "ghcr.io" -u "${{ github.actor }}" --password-stdin

      - name: Build container image
        run: |
          docker build \
            -f .devcontainer/Dockerfile \
            -t "${CONTAINER_IMAGE}:latest" \
            -t "${CONTAINER_IMAGE}:${{ github.ref_name }}" \
            -t "${CONTAINER_IMAGE}:${{ github.sha }}" \
            .

      - name: Push container image
        run: |
          docker push "${CONTAINER_IMAGE}:latest"
          docker push "${CONTAINER_IMAGE}:${{ github.ref_name }}"
          docker push "${CONTAINER_IMAGE}:${{ github.sha }}"
